name: etl pipeline

on:
  push:
    branches:
      - main
jobs:
  job1:
    runs-on: ubuntu-latest
    steps:
    - name: checkout code
      uses: actions/checkout@v2
    - name: Print message
      run: echo'job one'
  job2:
    runs-on: ubuntu-latest
    needs: job1
    steps:
    - name: checkout code
      uses: actions/checkout@v2
    - name: print message
      run: echo "job two"
  job3:
    runs-on: ubuntu-latest
    needs: job1
    steps:
    - name: checkout code
      uses: actions/checkout@v2
    - name: print message
      run: echo "job three"
  job4:
    runs-on: ubuntu-latest
    needs: job2
    steps:
    - name: checkout code
      uses: actions/checkout@v2
    - name: print message
      run: echo "job four"
  job5:
    runs-on: ubuntu-latest
    needs: job3
    steps:
    - name: checkout code
      uses: actions/checkout@v2
    - name: print message
      run: echo "job five"
  job6:
    runs-on: ubuntu-latest
    needs: [job4,job5]
    steps:
    - name: checkout code
      uses: actions/checkout@v2
    - name: print message
      run: echo "job six"
    